<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Payment Tracker</h1>
            <div class="total">Total: <span id="total">$0</span></div>
        </div>

        <button class="big-btn" onclick="quickPay()">
            <span class="big-btn-icon">+</span>
            <span class="big-btn-text">Got Paid $50</span>
            <span class="big-btn-sub">Tap to log today's payment</span>
        </button>

        <div class="history" id="history">
            <p class="empty">No payments yet. Hit the button above when you get paid!</p>
        </div>

        <div class="bottom-bar">
            <button class="link-btn" onclick="exportData()">Export</button>
            <button class="link-btn" onclick="importData()">Import</button>
            <button class="link-btn" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
