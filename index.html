<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Payment Tracker</h1>
            <div class="total">Total: <span id="total">$0</span></div>
        </div>

        <div class="add-row">
            <span class="dollar">$</span>
            <input type="number" id="amount" value="50" min="0">
            <input type="date" id="date">
            <button class="add-btn" onclick="addPayment()">+ Add</button>
        </div>

        <div class="history" id="history">
            <p class="empty">No payments yet</p>
        </div>

        <div class="bottom-bar">
            <button class="link-btn" onclick="exportData()">Export</button>
            <button class="link-btn" onclick="importData()">Import</button>
            <button class="link-btn" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
